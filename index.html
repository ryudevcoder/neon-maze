<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon-Maze | Arcade Experience</title>
    <meta name="description" content="Um jogo estilo Pac-Man com estética neon e mecânicas modernas.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>NEON-MAZE</h1>

    <div id="ui">
        <div class="stat">
            <span class="label">Pontos</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="stat">
            <span class="label">Combo</span>
            <span id="combo" class="value">x0</span>
        </div>
        <div class="stat">
            <span class="label">Nível</span>
            <span id="level" class="value">1</span>
        </div>
        <div class="stat">
            <span class="label">Vidas</span>
            <span id="lives" class="value">3</span>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
